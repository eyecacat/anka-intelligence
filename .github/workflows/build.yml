jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ISO inside Debian Docker Container
        run: |
          docker run --rm --privileged \
            -v "$PWD":/work \
            -w /work \
            debian:bookworm \
            bash -c "
              apt-get update && apt-get install -y live-build debootstrap debian-archive-keyring ca-certificates squashfs-tools xorriso isolinux syslinux-common
              bash build.sh
            "
