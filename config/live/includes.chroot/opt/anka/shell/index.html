<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anka Intelligence OS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════
       LİSANS AKTİVASYON MODAL (Overlay)
  ══════════════════════════════════════════════ -->
  <div id="activation-overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
    <div class="activation-card">

      <div class="activation-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M24 4L6 14V34L24 44L42 34V14L24 4Z" stroke="#F59E0B" stroke-width="2" fill="none"/>
          <path d="M24 4L24 44M6 14L42 34M42 14L6 34" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
          <circle cx="24" cy="24" r="5" fill="#F59E0B"/>
        </svg>
      </div>

      <h1 id="overlay-title" class="activation-title">Anka Intelligence OS</h1>
      <p class="activation-subtitle">Devam etmek için lisans anahtarınızı girin</p>

      <div class="input-group">
        <label for="license-input" class="input-label">Lisans Anahtarı</label>
        <input
          id="license-input"
          type="password"
          class="license-input"
          placeholder="sk-or-••••••••••••••••••••••••"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="toggle-visibility" id="toggle-key-vis" type="button" title="Göster/Gizle" aria-label="Anahtarı göster veya gizle">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button id="activate-btn" class="activate-btn" type="button">
        <span class="btn-text">Etkinleştir</span>
        <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <p class="activation-hint">
        Lisans anahtarınız OpenRouter API anahtarınızdır.<br/>
        Anahtar yalnızca bu oturum için bellekte tutulur.
      </p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       TOAST BİLDİRİM KAPSAYICISI
  ══════════════════════════════════════════════ -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ══════════════════════════════════════════════
       ANA UYGULAMA
  ══════════════════════════════════════════════ -->
  <div id="app" class="app-shell hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path d="M24 4L6 14V34L24 44L42 34V14L24 4Z" stroke="#F59E0B" stroke-width="2" fill="none"/>
          <circle cx="24" cy="24" r="5" fill="#F59E0B"/>
        </svg>
        <span class="sidebar-brand">Anka OS</span>
      </div>

      <nav class="agent-list" id="agent-list" aria-label="AI Ajanlar">
        <!-- JS ile doldurulur -->
      </nav>

      <div class="sidebar-footer">
        <button id="clear-session-btn" class="clear-btn" title="Oturumu temizle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
          </svg>
          Sohbeti Temizle
        </button>
        <button id="logout-btn" class="logout-btn" title="Anahtarı unut ve çıkış yap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Çıkış
        </button>
      </div>
    </aside>

    <!-- Chat alanı -->
    <main class="chat-area">
      <header class="chat-header">
        <div>
          <h2 id="active-agent-name" class="chat-agent-title">Genel Asistan</h2>
          <span id="active-agent-model" class="chat-agent-model">—</span>
        </div>
        <div class="header-badge">
          <span class="badge-dot"></span>
          <span>Çevrimiçi</span>
        </div>
      </header>

      <div class="messages" id="messages" role="log" aria-label="Sohbet geçmişi"></div>

      <div class="input-area">
        <textarea
          id="user-input"
          class="user-textarea"
          placeholder="Mesajınızı yazın... (Enter = gönder, Shift+Enter = yeni satır)"
          rows="1"
          aria-label="Mesaj giriş alanı"
        ></textarea>
        <button id="send-btn" class="send-btn" aria-label="Mesaj gönder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
